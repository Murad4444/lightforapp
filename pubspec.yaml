name: my_first_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0 # Проверь, чтобы версия SDK соответствовала твоей

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

# Настройки иконок (строго без отступов слева)
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.jpg"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon.jpg"

flutter:
  uses-material-design: true

  # Секция ассетов, чтобы иконка была видна системе
  assets:
    - assets/icon.jpg
